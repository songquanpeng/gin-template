{{template "header"}}
<div class="container px-lg-2 pb-3 bg-white">
    <div class="row mb-3">
        <div id="left" class="col-xl-8 pr-xl-5 pt-0">
            {{range $index, $page := .pages}}
            <div class="list-item border-bottom pt-3">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="item-left d-flex flex-column" style="justify-content: space-evenly;">
                        <a href="/page/{{$page.Link}}" class="text-body">
                            <h4 class="p-0 m-0 fw-bold text-break">
                                {{$page.Title}}
                            </h4>
                        </a>
                        <div class="d-flex align-items-center">
                            <div class="post-summary text-muted text-break">{{$page.Description}}</div>
                        </div>
                        <small>
                            <span class="me-3 fw-bold d-md-inline ">
                                <i class="bi bi-tags-fill"></i>
                                <a class="text-body mr-1" href=''>{{$page.Tag}}</a>
                            </span>
                            <span class="me-3"><i class="bi bi-calendar2-week-fill"></i>
                                         {{$page.CreatedAt}}</span>
                            <span><i class="bi bi-eye-fill"></i> {{$page.View}} 次浏览</span>
                        </small>
                    </div>
                </div>
            </div>
            {{end}}
        </div>
        <div id="right" class="col-xl-4 pt-3">
            <section id="profile" class="mt-4 bg-white d-xl-block d-none">
                <div class="card">
                    <div class="card-header">About</div>
                    <div class="card-body d-flex flex-column align-items-center">
                        <div class="mt-4 mb-4point5 w-100 d-flex justify-content-center">
                            <div class="w-50 text-right mr-3" style="text-align: center">
                                <img src="" class="card-img-top rounded-circle"
                                     style="width: 6.5rem; height: 6.5rem" alt="brand_image">
                            </div>
                            <div class="w-50 text-left ml-3 d-flex flex-column justify-content-center pe-3">
                                <span class="h4 d-block">config.author</span>
                                <span class="text-muted text-break" style="text-align: justify">
                                <i class="fas fa-map-marker-alt mr-1"></i>
                                config.description
                                </span>
                            </div>
                        </div>

                    </div>

                    <div class="mb-4 mt-n2">
                    </div>

                </div>
            </section>
            <section id="tags" class="mt-4 mb-5 bg-white">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-tags mr-2"></i>
                        Notice
                    </div>
                    <div class="card-body">
                        Notice will be shown here.
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
{{template "footer"}}
